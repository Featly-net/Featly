<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Featly</title>
    <meta name="featly-mount-path" content="__MOUNT_PATH__" />
    <link rel="stylesheet" href="__MOUNT_PATH__/app.css" />
</head>
<body>
    <a class="skip-link" href="#main">Skip to main content</a>

    <header class="app-header">
        <div class="app-header__brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <span class="brand-name">Featly</span>
            <span class="brand-version" id="brand-version">preview</span>
        </div>
        <nav class="app-header__env" aria-label="Environment selector">
            <label class="env-label" for="env-select">Environment</label>
            <select class="env-select" id="env-select" disabled>
                <option>development</option>
            </select>
        </nav>
    </header>

    <div class="app-shell">
        <nav class="app-sidebar" aria-label="Primary">
            <ul class="nav">
                <li><a class="nav__link" href="__MOUNT_PATH__/" data-route="/">Overview</a></li>
                <li><a class="nav__link" href="__MOUNT_PATH__/flags" data-route="/flags">Flags</a></li>
                <li><a class="nav__link" href="__MOUNT_PATH__/configs" data-route="/configs">Configs</a></li>
                <li><a class="nav__link" href="__MOUNT_PATH__/segments" data-route="/segments">Segments</a></li>
                <li><a class="nav__link" href="__MOUNT_PATH__/settings" data-route="/settings">Settings</a></li>
            </ul>
        </nav>

        <main class="app-main" id="main" tabindex="-1">
            <div id="view" class="view" role="region" aria-live="polite"></div>
        </main>
    </div>

    <footer class="app-footer">
        <span>
            Featly &middot;
            <a href="https://github.com/Featly-net/Featly" target="_blank" rel="noopener">source</a>
            &middot;
            <a href="https://github.com/Featly-net/Featly/blob/main/CHANGELOG.md" target="_blank" rel="noopener">changelog</a>
        </span>
        <span class="app-footer__milestone">M5 skeleton</span>
    </footer>

    <script src="__MOUNT_PATH__/app.js"></script>
</body>
</html>

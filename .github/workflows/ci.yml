name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-progress runs for the same ref when a new run starts.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  CONFIGURATION: Release

jobs:
  build:
    name: build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET 8 SDK (needed for net8.0 multi-target)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10 SDK (primary)
        uses: actions/setup-dotnet@v5
        with:
          # global.json pins 10.0.300; setup-dotnet honors the file when present.
          global-json-file: global.json

      - name: Show installed SDKs
        run: dotnet --info

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Featly.sln

      # Run format check on Linux only: the policy is OS-agnostic and running
      # it twice just wastes minutes. The macOS/Windows path would also flag
      # spurious CRLF issues if .gitattributes ever misbehaves.
      #
      # `--severity warn` blocks the build on warnings/errors but lets info-level
      # suggestions (IDE1006 naming hints, IDE0290 primary-constructor refactors,
      # etc.) surface as advice without failing CI. Cleanup of those is tracked
      # separately and can be done in dedicated style PRs.
      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: dotnet format Featly.sln --verify-no-changes --no-restore --severity warn

      - name: Build
        run: dotnet build Featly.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      # RequiresPostgres tests need a real Postgres reachable, which the
      # GitHub-hosted Windows runner can't provide (Actions service containers
      # are Linux-only) — they run in the dedicated postgres-tests job below
      # instead, against a real service container on ubuntu-latest.
      - name: Test
        run: >
          dotnet test Featly.sln
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --filter "Category!=RequiresPostgres"
          --logger "trx;LogFileName=test-results.trx"
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/**/*
          if-no-files-found: warn
          retention-days: 14

  postgres-tests:
    name: postgres provider tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: featly
          POSTGRES_PASSWORD: featly
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore tests/Featly.Storage.Postgres.Tests/Featly.Storage.Postgres.Tests.csproj

      - name: Test
        env:
          FEATLY_POSTGRES_TEST_HOST: localhost
          FEATLY_POSTGRES_TEST_PORT: "5432"
          FEATLY_POSTGRES_TEST_USER: featly
          FEATLY_POSTGRES_TEST_PASSWORD: featly
        run: >
          dotnet test tests/Featly.Storage.Postgres.Tests/Featly.Storage.Postgres.Tests.csproj
          --configuration ${{ env.CONFIGURATION }}
          --logger "trx;LogFileName=test-results.trx"
          --logger "console;verbosity=normal"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-postgres
          path: TestResults/**/*
          if-no-files-found: warn
          retention-days: 14

  pack:
    name: pack (preview)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Featly.sln

      - name: Pack
        run: >
          dotnet pack Featly.sln
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          --output ./artifacts
          -p:ContinuousIntegrationBuild=true

      - name: Upload nupkgs
        uses: actions/upload-artifact@v7
        with:
          name: nupkgs
          path: artifacts/*.*nupkg
          if-no-files-found: error
          retention-days: 14

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday at 06:00 UTC, off-peak for most timezones.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  actions: read
  security-events: write
  pull-requests: read

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET 8 SDK (needed for net8.0 multi-target)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          # Default + security-extended is a reasonable tradeoff between
          # signal and noise for an open-source library.
          queries: security-and-quality

      - name: Restore
        run: dotnet restore Featly.sln

      - name: Build (CodeQL must observe the compile to track dataflow)
        run: dotnet build Featly.sln --configuration Release --no-restore

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

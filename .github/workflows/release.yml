name: Release

# Two publish paths, one workflow:
#   - push to main         -> publish to GitHub Packages (internal/preview feed)
#   - tag v*               -> publish to nuget.org       (public stable)
# Both paths share the same `pack` job. The publish jobs depend on it and gate
# themselves on the trigger so we never push twice.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish on a manual run"
        required: true
        type: choice
        default: github-packages
        options:
          - github-packages
          - nuget-org

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Least-privilege: each job declares only the permission it actually needs,
# rather than one workflow-wide grant every job inherits.
permissions: {}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release

jobs:
  pack:
    name: Pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # MinVer needs the full history and tags to compute the version.
          fetch-depth: 0

      - name: Setup .NET 8 SDK (needed for net8.0 multi-target)
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Featly.sln

      - name: Build
        run: dotnet build Featly.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      # RequiresPostgres tests need a real Postgres reachable, which this
      # workflow doesn't provision (see ci.yml's dedicated postgres-tests job
      # for those); excluding them here mirrors ci.yml's main build job.
      - name: Test
        run: >
          dotnet test Featly.sln
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --filter "Category!=RequiresPostgres"
          --logger "console;verbosity=normal"

      - name: Pack
        run: dotnet pack Featly.sln --configuration ${{ env.CONFIGURATION }} --no-build --output artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nupkgs
          path: artifacts/*.*nupkg
          if-no-files-found: error
          retention-days: 30

  publish-github-packages:
    name: Publish to GitHub Packages (main)
    needs: pack
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'github-packages')
    runs-on: ubuntu-latest
    permissions:
      packages: write   # needed for the GitHub Packages push below
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: nupkgs
          path: artifacts

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Push to GitHub Packages
        # GITHUB_TOKEN comes free with packages:write permission set above.
        # --skip-duplicate so re-runs after partial failures don't error.
        # Reference the shell env var, not a direct secrets.* expansion --
        # the latter inlines the value into the script text itself.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          dotnet nuget push 'artifacts/*.nupkg'
          --source https://nuget.pkg.github.com/Featly-net/index.json
          --api-key "$GITHUB_TOKEN"
          --skip-duplicate

  publish-nuget-org:
    name: Publish to nuget.org (tag)
    needs: pack
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'nuget-org')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Tying the job to a GitHub Environment lets you require manual approval
    # before publishing to nuget.org. Configure the "nuget-org" environment
    # at Settings > Environments > nuget-org with required reviewers if you
    # want a final human checkpoint before a tag goes public.
    environment:
      name: nuget-org
      url: https://www.nuget.org/profiles/thiagolugarini
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: nupkgs
          path: artifacts

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Validate NUGET_API_KEY is configured
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY repository secret is not set. Add it at Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Push to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >
          dotnet nuget push 'artifacts/*.nupkg'
          --source https://api.nuget.org/v3/index.json
          --api-key "$NUGET_API_KEY"
          --skip-duplicate

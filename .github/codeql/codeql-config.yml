name: Featly CodeQL config

# Keep the curated query suite — the default-plus-quality bundle gives us
# decent signal without drowning in style nits.
queries:
  - uses: security-and-quality

# Skip generated MSBuild output. Anything under bin/ or obj/ is either an
# auto-generated entry point (XunitAutoGeneratedEntryPoint) or build
# artifacts that we don't ship and don't want CodeQL to scan as if it were
# hand-written code.
paths-ignore:
  - "**/bin/**"
  - "**/obj/**"
